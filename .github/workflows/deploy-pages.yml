name: Deploy prototype to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          if [ -z "$FIREBASE_CONFIG_JSON" ]; then
            echo "::error::Missing GitHub Actions secret FIREBASE_CONFIG_JSON. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          printf 'window.SHANCHUAN_FIREBASE_CONFIG = %s;\n' "$FIREBASE_CONFIG_JSON" > public/prototype/firebase-config.js
          mkdir -p deploy
          cp index.html deploy/index.html
          cp -R public deploy/public
          if [ -f CNAME ]; then cp CNAME deploy/CNAME; fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
